<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Finanças Fácil</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <meta name="theme-color" content="#4f46e5">
</head>
<body>

    <div class="auth-container">
        <div class="brand">
            <div class="brand-icon">
                <i class="fa-solid fa-dollar-sign"></i>
            </div>
            <h1 class="brand-title">FinançasFácil</h1>
            <p class="brand-subtitle">Recuperação de Acesso</p>
        </div>

        <div class="card auth-form-card">
            <form id="resetForm" class="form-toggle active">
                <h2 style="font-size: 1rem; margin-bottom: 0.25rem;">Redefinir Senha</h2>
                <p style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1.5rem;">Digite sua nova senha abaixo.</p>
                
                <div class="input-group">
                    <label>Nova Senha</label>
                    <input type="password" id="resetPass1" class="input-control" placeholder="••••••••" required>
                </div>
                <div class="input-group" style="margin-bottom: 1.5rem;">
                    <label>Confirme a Nova Senha</label>
                    <input type="password" id="resetPass2" class="input-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Salvar Nova Senha</button>
                
                <div style="text-align:center; margin-top: 1.5rem;">
                    <a href="/" style="color: var(--primary-green); text-decoration:none; font-size: 0.875rem;">Voltar para o Login</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const p1 = document.getElementById('resetPass1').value;
            const p2 = document.getElementById('resetPass2').value;
            if (p1 !== p2) return alert("As senhas não coincidem!");
            
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            if(!token) return alert("Link de recuperação inválido.");

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ token, password: p1 })
                });
                const data = await res.json();
                if(res.ok) {
                    alert("Senha alterada com sucesso! Você já pode logar.");
                    window.location.href = '/';
                } else {
                    alert(data.error);
                }
            } catch(err) {
                alert("Erro ao redefinir a senha.");
            }
        });
    </script>
</body>
</html>
